# FlClouds Nginx 配置
# 请将此文件复制到 /etc/nginx/sites-available/co.zrn.qzz.io
# 然后创建软链接: ln -s /etc/nginx/sites-available/co.zrn.qzz.io /etc/nginx/sites-enabled/

server {
    listen 80;
    listen [::]:80;
    server_name co.zrn.qzz.io;

    # HTTP 重定向到 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }

    # Certbot 验证（如果使用 certbot）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name co.zrn.qzz.io;

    # SSL 证书路径（请根据实际情况修改）
    ssl_certificate /etc/letsencrypt/live/co.zrn.qzz.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/co.zrn.qzz.io/privkey.pem;

    # SSL 配置
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 上传大小限制
    client_max_body_size 500M;

    # 前端
    location / {
        proxy_pass http://127.0.0.1:47832;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # 后端 API
    location /api {
        proxy_pass http://127.0.0.1:51947;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # 上传超时
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # 静态文件（上传的文件）
    location /uploads {
        proxy_pass http://127.0.0.1:51947/uploads;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 1d;
        add_header Cache-Control "public";
    }

    # 缩略图
    location /thumbnails {
        proxy_pass http://127.0.0.1:51947/thumbnails;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public";
    }

    # 健康检查
    location /health {
        proxy_pass http://127.0.0.1:51947/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
