name: flclouds

services:
  # 前端（暴露到宿主机供 Nginx 反代）
  frontend:
    image: flclouds-frontend:latest
    build:
      context: ./frontend
      args:
        - VITE_API_URL=${VITE_API_URL:-https://api.example.com}
    container_name: flclouds-frontend
    ports:
      - "47832:80"
    networks:
      - flclouds-network
    restart: unless-stopped

  # 后端（暴露到宿主机供 Nginx 反代）
  backend:
    image: flclouds-backend:latest
    build: ./backend
    container_name: flclouds-backend
    ports:
      - "51947:51947"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://flclouds:${DB_PASSWORD:-flclouds123}@postgres:5432/flclouds
      - PORT=51947
      - UPLOAD_DIR=/data/uploads
      - THUMBNAIL_DIR=/data/thumbnails
      - CHUNK_DIR=/data/chunks
      - VITE_API_URL=${VITE_API_URL:-https://api.example.com}
      - CORS_ORIGIN=${CORS_ORIGIN:-https://cloud.example.com}
      - ACCESS_PASSWORD_HASH=${ACCESS_PASSWORD_HASH:-}
      - DOMAIN=${DOMAIN:-cloud.example.com}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_API_ID=${TELEGRAM_API_ID:-}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH:-}
      - TELEGRAM_USER_API_ID=${TELEGRAM_USER_API_ID:-}
      - TELEGRAM_USER_API_HASH=${TELEGRAM_USER_API_HASH:-}
      - TELEGRAM_USER_SESSION_FILE=${TELEGRAM_USER_SESSION_FILE:-/data/telegram_user_session.txt}
      - TELEGRAM_DOWNLOAD_BRIDGE_CHAT_ID=${TELEGRAM_DOWNLOAD_BRIDGE_CHAT_ID:-}
      - TELEGRAM_DOWNLOAD_WORKERS=${TELEGRAM_DOWNLOAD_WORKERS:-4}
      - TOTP_SECRET=${TOTP_SECRET:-}
    volumes:
      - file-storage:/data
    networks:
      - flclouds-network
    restart: unless-stopped

  # 数据库
  postgres:
    image: postgres:16-alpine
    container_name: flclouds-postgres
    environment:
      - POSTGRES_DB=flclouds
      - POSTGRES_USER=flclouds
      - POSTGRES_PASSWORD=${DB_PASSWORD:-flclouds123}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - flclouds-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U flclouds -d flclouds" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  file-storage:
    driver: local
  postgres-data:
    driver: local

networks:
  flclouds-network:
    driver: bridge
