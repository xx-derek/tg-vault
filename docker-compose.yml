name: flclouds

services:
  # 前端（暴露到宿主机供 Nginx 反代）
  frontend:
    image: flclouds-frontend:latest
    build:
      context: ./frontend
      args:
        - VITE_API_URL=${VITE_API_URL:-https://api.example.com}
    container_name: flclouds-frontend
    ports:
      - "127.0.0.1:47832:80"
    networks:
      - flclouds-network
    restart: unless-stopped

  # 后端（暴露到宿主机供 Nginx 反代）
  backend:
    image: flclouds-backend:latest
    build: ./backend
    container_name: flclouds-backend
    ports:
      - "127.0.0.1:51947:51947"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://flclouds:${DB_PASSWORD:?DB_PASSWORD is required}@postgres:5432/flclouds
      - PORT=51947
      - NODE_ENV=production
      - COOKIE_SECURE=${COOKIE_SECURE:-true}
      - UPLOAD_DIR=/data/uploads
      - THUMBNAIL_DIR=/data/thumbnails
      - CHUNK_DIR=/data/chunks
      - DUPLICATE_FILE_MODE=${DUPLICATE_FILE_MODE:-copy}
      - AUTO_CLEANUP_ORPHANS=${AUTO_CLEANUP_ORPHANS:-true}
      - VITE_API_URL=${VITE_API_URL:-https://api.example.com}
      - CORS_ORIGIN=${CORS_ORIGIN:-https://cloud.example.com}
      - SESSION_SECRET=${SESSION_SECRET:-}
      - STORAGE_CREDENTIALS_SECRET=${STORAGE_CREDENTIALS_SECRET:-}
      - FLCLOUDS_SECRET_DIR=/data/secrets
      - DOMAIN=${DOMAIN:-cloud.example.com}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_API_ID=${TELEGRAM_API_ID:-}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH:-}
      - TELEGRAM_USER_SESSION_FILE=${TELEGRAM_USER_SESSION_FILE:-/data/telegram_user_session.txt}
      - TELEGRAM_DOWNLOAD_WORKERS=${TELEGRAM_DOWNLOAD_WORKERS:-4}
      - TELEGRAM_RATE_WINDOW_MS=${TELEGRAM_RATE_WINDOW_MS:-60000}
      - TELEGRAM_RATE_MAX=${TELEGRAM_RATE_MAX:-30}
      - TELEGRAM_HEAVY_RATE_WINDOW_MS=${TELEGRAM_HEAVY_RATE_WINDOW_MS:-600000}
      - TELEGRAM_HEAVY_RATE_MAX=${TELEGRAM_HEAVY_RATE_MAX:-5}
      - TOTP_SECRET=${TOTP_SECRET:-}
    volumes:
      - file-storage:/data
    networks:
      - flclouds-network
    restart: unless-stopped

  # 数据库
  postgres:
    image: postgres:16-alpine
    container_name: flclouds-postgres
    environment:
      - POSTGRES_DB=flclouds
      - POSTGRES_USER=flclouds
      - POSTGRES_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - flclouds-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U flclouds -d flclouds" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  file-storage:
    driver: local
  postgres-data:
    driver: local

networks:
  flclouds-network:
    driver: bridge
